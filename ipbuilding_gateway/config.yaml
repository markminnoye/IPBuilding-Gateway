name: IPBuilding Gateway
version: "1.4.0"
slug: ipbuilding_gateway
description: Open IPBuilding field-bus gateway (UDP/1001) — replaces proprietary IPBox hub
url: https://github.com/markminnoye/IPBuilding-Gateway
startup: application
init: false
arch:
  - aarch64
  - amd64
map:
  - addon_config:rw
ports:
  8080/tcp: null
  30200/tcp: null
host_network: true
hassio_api: true
ingress: true
ingress_port: 8080
panel_icon: mdi:home-variant-outline
panel_title: IPBuilding Gateway
discovery:
  - ha_ipbuilding_gateway
privileged: []
options:

  # --- Network / API ----------------------------------------------------
  # IP waarop de gateway als hub op UDP/1001 fungeert (wordt IPBox vervanger).
  hub_ip: 10.10.1.1
  # Poort voor WebSocket /ws en REST /api/v1/.
  api_port: 8080
  # Zet aan om de legacy IPBox REST :30200 shim te starten (alleen tijdens migratie).
  rest_shim_enabled: false
  # Per-request timeout (s) voor HTTP-calls naar modules (getSysSet, getButtons).
  http_timeout_s: 2.0
  # Idle-tolerance (s) voor trage / zwaar belaste modules.
  metadata_timeout_s: 5.0

  # --- Hub / field bus --------------------------------------------------
  # Seconden tussen UDP/1001 input-polls (I0000) — IPBox ~2 s.
  poll_interval: 2.0
  # Seconden tussen relay/dimmer keep-alive polls (P0000 / I9900) — IPBox ~20 s.
  actuator_poll_interval: 20.0
  # Pad naar installatie-specifieke data (modules, namen, kamers, active flags).
  devices_file: /config/devices.json

  # --- Discovery --------------------------------------------------------
  # /24 veldbus subnet waarop ARP/HTTP discovery draait.
  discovery_subnet: 10.10.1
  # Eerste host in scan-range (ARP + HTTP identify).
  discovery_range_start: 0
  # Laatste host in scan-range (ARP + HTTP identify).
  discovery_range_end: 254
  # Bij start een actieve ARP-sweep + HTTP-identify draaien.
  auto_discover_on_start: false
  # Passief meekijken op ARP-verkeer zonder broadcast (geen actieve scan).
  passive_arp_monitor: true
  # Frequentie (s) van de passieve ARP-poll in DiscoveryConfig.
  arp_poll_interval_s: 30.0
  # Lab/RE: poll vaste relay/dimmer/input IPs wanneer devices.json ontbreekt of ongeldig is.
  # Productie-installaties laten dit uit; discovery vult devices.json.
  use_env_defaults: false

  # --- Logging ----------------------------------------------------------
  # debug | info | warning | error (HA Supervisor standaard).
  log_level: info

schema:
  # --- Network / API ---
  hub_ip: str
  api_port: port
  rest_shim_enabled: bool
  http_timeout_s: float
  metadata_timeout_s: float
  # --- Hub / field bus ---
  poll_interval: float
  actuator_poll_interval: float
  devices_file: str
  # --- Discovery ---
  discovery_subnet: str
  discovery_range_start: int
  discovery_range_end: int
  auto_discover_on_start: bool
  passive_arp_monitor: bool
  arp_poll_interval_s: float
  use_env_defaults: bool
  # --- Logging ---
  log_level: list(debug|info|warning|error)

boot: auto
auto_update: true
watchdog: http://[HOST]:[PORT:8080]/health
image: ghcr.io/markminnoye/ipbuilding-gateway
