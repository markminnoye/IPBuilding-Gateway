name: IPBuilding Gateway
version: "1.6.2"
slug: ipbuilding_gateway
description: Open IPBuilding field-bus gateway (UDP/1001) — replaces proprietary IPBox hub
url: https://github.com/markminnoye/IPBuilding-Gateway
startup: application
init: false
arch:
  - aarch64
  - amd64
map:
  - addon_config:rw
ports:
  8080/tcp: null
  30200/tcp: null
host_network: true
hassio_api: true
ingress: true
ingress_port: 8080
panel_icon: mdi:home-variant-outline
panel_title: IPBuilding Gateway
discovery:
  - ha_ipbuilding_gateway
privileged: []
options:
  installation:
    expose_inactive_channels: false
    multi_press: false
    multi_press_window_ms: 350
    devices_file: /config/devices.json
  fieldbus:
    buttons_via_ha: true
    poll_interval: 2.0
    actuator_poll_interval: 20.0
  network:
    bind_ip: 0.0.0.0
    rest_shim_enabled: false
    http_timeout_s: 2.0
    metadata_timeout_s: 5.0
  discovery:
    discovery_subnet: 10.10.1
    discovery_range_start: 0
    discovery_range_end: 254
    auto_discover_on_start: false
    passive_arp_monitor: true
    arp_poll_interval_s: 30.0
    use_env_defaults: false
  logging:
    log_level: info

schema:
  installation:
    expose_inactive_channels: bool
    multi_press: bool
    multi_press_window_ms: int(1,)
    devices_file: str
  fieldbus:
    buttons_via_ha: bool
    poll_interval: float
    actuator_poll_interval: float
  network:
    bind_ip: str
    rest_shim_enabled: bool
    http_timeout_s: float
    metadata_timeout_s: float
  discovery:
    discovery_subnet: str
    discovery_range_start: int
    discovery_range_end: int
    auto_discover_on_start: bool
    passive_arp_monitor: bool
    arp_poll_interval_s: float
    use_env_defaults: bool
  logging:
    log_level: list(debug|info|warning|error)

boot: auto
auto_update: true
watchdog: http://[HOST]:[PORT:8080]/health
image: ghcr.io/markminnoye/ipbuilding-gateway
