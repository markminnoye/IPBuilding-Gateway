configuration:
  fieldbus:
    name: Modules
    description: Communication with relay, dimmer, and input modules.
    fields:
      buttons_via_ha:
        name: Wall buttons via Home Assistant
        description: >-
          On (default): presses on the IP1100 are sent to Home Assistant as events.
          What a press does (light on/off, scene, automation, …) you set in HA.


          Off: presses stay local on the IP1100 using its stored pairings.
          No button events go to Home Assistant (useful during migration).


          Green LED on the module: steady = buttons via HA (slave), blinking = local (master).
          If the gateway fails, the module falls back to local pairings.


          Restart the add-on after changing this.
      poll_interval:
        name: Input poll interval
        description: Only when wall buttons via Home Assistant is on. How often (seconds) the gateway polls the input module (default ~2 s).
      actuator_poll_interval:
        name: Actuator poll interval
        description: How often (seconds) the gateway polls relay and dimmer modules to keep them online (default ~20 s).
  network:
    name: Network
    description: Settings for talking to the field-bus modules. The API and web UI port are set under the add-on's Network section (not here).
    fields:
      bind_ip:
        name: Field-bus bind address
        description: Which IP address the gateway listens on for field-bus modules. Default 0.0.0.0 (all network interfaces). Set e.g. 10.10.1.1 to listen only on the field-bus interface.
      rest_shim_enabled:
        name: IPBox REST compatibility
        description: Enable the old IPBox REST API on port 30200 so existing clients (e.g. the legacy HA integration) keep working during migration. Off by default.
      http_timeout_s:
        name: HTTP timeout (discovery)
        description: Maximum wait time (seconds) when identifying modules during discovery.
      metadata_timeout_s:
        name: HTTP timeout (modules)
        description: Maximum wait time (seconds) when fetching module details. Increase on a slow VLAN.
  installation:
    name: Installation
    description: Installation settings and path to devices.json (names, rooms, active/inactive).
    fields:
      expose_inactive_channels:
        name: Show inactive channels
        description: Show unused relay/dimmer channels (active: false). Off by default — the Web UI always lists all channels.
      multi_press:
        name: Detect double/triple press
        description: >-
          Recognize double and triple presses on all wall buttons. The Multi-press
          window sets how long clicks count as one gesture. Restart the add-on after changing this.
      multi_press_window_ms:
        name: Multi-press window (ms)
        description: >-
          Time window (ms) in which a second or third click counts with the previous one.
          Default 350. Restart the add-on after changing this.
      devices_file:
        name: devices.json path
        description: Path to the installation config file; visible via Samba under addon_configs/…/devices.json.
  discovery:
    name: Discovery
    description: Automatically find modules on the field-bus subnet.
    fields:
      discovery_subnet:
        name: Discovery subnet
        description: Subnet (/24) to search for modules (e.g. 10.10.1).
      discovery_range_start:
        name: Scan range start
        description: First host number in the scan range (0 = full /24).
      discovery_range_end:
        name: Scan range end
        description: Last host number in the scan range.
      auto_discover_on_start:
        name: Discover on start
        description: Search for modules when the add-on starts. An empty devices.json always triggers a scan.
      passive_arp_monitor:
        name: Passive ARP monitor
        description: Watch network traffic to detect new or removed modules, without sending a broadcast scan.
      arp_poll_interval_s:
        name: ARP poll interval
        description: How often (seconds) the passive monitor checks the network.
      use_env_defaults:
        name: Lab fixed IPs
        description: Use fixed module IPs (.30/.40/.50) when devices.json is missing. Lab/test only — leave off in production.
  logging:
    name: Logging
    description: How verbose the add-on logs are.
    fields:
      log_level:
        name: Log level
        description: debug, info, warning, or error.
network:
  8080/tcp: API and web UI — WebSocket /ws and REST /api/v1/ (companion integration; web UI via Ingress).
  30200/tcp: IPBox REST compatibility (only used when enabled under Network → IPBox REST compatibility).
