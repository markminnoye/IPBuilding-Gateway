configuration:
  fieldbus:
    name: Modules
    description: Communication with relay, dimmer, and input modules.
    fields:
      hub_role:
        name: Input module mode (IP1100)
        description: >-
          The IP1100PoE input module has two modes. Check the green LED on the module: steady = slave, blinking = master.


          slave — Gateway and Home Assistant control buttons (default)
          This gateway is the centrale for wall buttons on the field bus. Buttons send events to Home Assistant; you build automations, scenes, and routing in HA. On the module: green LED steady on.


          master — Input module controls buttons locally
          This gateway does not claim the input module: buttons do not appear in Home Assistant. Buttons drive relays and dimmers directly from pairings stored on the input module. Relays and dimmers remain available via this gateway and Home Assistant (app, automations without buttons). Button-triggered scenes and advanced routing are unavailable. On the module: green LED blinking. Choose master if you are not ready to route buttons through HA yet, or temporarily while the rest already runs on this gateway.


          Fallback: if the gateway fails or loses connection, the input module takes over using its own stored pairings (not necessarily the same as in Home Assistant). The LED blinks and basic button lighting keeps working. In slave mode that on-module configuration remains as a safety net.


          Restart the add-on after changing this.
      poll_interval:
        name: Input poll interval
        description: Only relevant in slave mode. Seconds between polls to the input module (default ~2 s).
      actuator_poll_interval:
        name: Actuator poll interval
        description: Seconds between relay/dimmer keep-alive polls (default ~20 s).
  network:
    name: Network
    description: Field-bus bind address, IPBox REST shim, and HTTP timeouts to field modules. The northbound API/web UI port is fixed and shown under the add-on's Network section (not here).
    fields:
      bind_ip:
        name: Field-bus bind address
        description: IP address the gateway's UDP field-bus socket binds to. Default 0.0.0.0 (all interfaces). Set to a specific interface IP, e.g. 10.10.1.1, to explicitly bind to the field-bus NIC.
      rest_shim_enabled:
        name: IPBox REST shim
        description: Legacy IPBox REST on port 30200 — migration only.
      http_timeout_s:
        name: HTTP timeout (discovery)
        description: Timeout (s) for HTTP calls during ARP/identify discovery.
      metadata_timeout_s:
        name: HTTP timeout (modules)
        description: Timeout (s) for getSysSet / getButtons on modules (raise on slow VLAN).
  installation:
    name: Installation
    description: Path to devices.json (names, rooms, active flags).
    fields:
      devices_file:
        name: devices.json path
        description: Installation backup; visible via Samba under addon_configs/…/devices.json.
  discovery:
    name: Discovery
    description: Runtime auto-discovery on the field-bus subnet.
    fields:
      discovery_subnet:
        name: Discovery subnet
        description: /24 subnet for ARP sweep and passive monitor (e.g. 10.10.1).
      discovery_range_start:
        name: Scan range start
        description: First host in ARP/HTTP scan range (0 = full /24).
      discovery_range_end:
        name: Scan range end
        description: Last host in ARP/HTTP scan range.
      auto_discover_on_start:
        name: Discover on start
        description: Active ARP sweep + HTTP identify on add-on start (empty devices.json always triggers sweep).
      passive_arp_monitor:
        name: Passive ARP monitor
        description: Watch ARP traffic without broadcast (detect new/removed modules).
      arp_poll_interval_s:
        name: ARP poll interval
        description: Interval (s) for passive ARP polling.
      use_env_defaults:
        name: Lab/RE fixed IPs
        description: Poll .30/.40/.50 when devices.json is missing — leave off in production.
  logging:
    name: Logging
    fields:
      log_level:
        name: Log level
        description: debug, info, warning, or error.
network:
  8080/tcp: Northbound API — WebSocket /ws and REST /api/v1/ (companion, Web UI via Ingress).
  30200/tcp: Legacy IPBox REST shim (only used when enabled under Network → IPBox REST shim).
