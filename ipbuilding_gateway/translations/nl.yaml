configuration:
  fieldbus:
    name: Modules
    description: Communicatie met relais-, dimmer- en ingangsmodules.
    fields:
      hub_role:
        name: Modus ingangsmodule (IP1100)
        description: >-
          De IP1100PoE-ingangsmodule heeft twee modi. Je herkent ze aan de groene LED op de module: continu = slave, knipperend = master.


          slave — Gateway en Home Assistant sturen aan (standaard)
          De gateway is de centrale voor drukknoppen op de veldbus. Drukknoppen sturen events naar Home Assistant; automatiseringen, scenes en wie wat schakelt regel je in HA. Op de module: groene LED brandt continu.


          master — Ingangsmodule stuurt knoppen zelf aan
          De gateway claimt de ingang niet: drukknoppen komen niet in Home Assistant. Knoppen bedienen relais en dimmers rechtstreeks volgens de koppelingen die op de ingangsmodule zijn opgeslagen. Relais en dimmers blijven wél via deze gateway en Home Assistant bedienbaar (app, automatiseringen zonder drukknop). Scenes en uitgebreide logica via drukknoppen zijn dan niet beschikbaar. Op de module: groene LED knippert. Kies master als je knoppen nog niet via HA wilt aansturen, of tijdelijk terwijl je de rest al via deze gateway laat lopen.


          Fallback: als de gateway uitvalt of geen verbinding heeft, neemt de ingangsmodule het over volgens zijn eigen opgeslagen koppelingen (niet noodzakelijk hetzelfde als in Home Assistant). De LED knippert dan en basisverlichting via knoppen blijft werken. Bij slave blijft die eigen configuratie op de module als noodvoorziening actief.


          Na wijziging: add-on herstarten.
      poll_interval:
        name: Input-poll interval
        description: Alleen relevant bij slave. Seconden tussen polls naar de ingangsmodule (standaard ~2 s).
      actuator_poll_interval:
        name: Actuator-poll interval
        description: Seconden tussen relay/dimmer keep-alive polls (standaard ~20 s).
  network:
    name: Netwerk
    description: Veldbus-bindadres, IPBox REST-shim en HTTP-timeouts naar veldbusmodules. De northbound API/web UI-poort ligt vast en staat onder de eigen "Network"-sectie van de add-on (niet hier).
    fields:
      bind_ip:
        name: Veldbus-bindadres
        description: IP-adres waarop de UDP-veldbus-socket van de gateway luistert. Standaard 0.0.0.0 (alle interfaces). Zet op een specifiek interface-IP, bijv. 10.10.1.1, om expliciet aan de veldbus-NIC te binden.
      rest_shim_enabled:
        name: IPBox REST-shim
        description: Legacy IPBox REST op poort 30200 — alleen tijdens migratie.
      http_timeout_s:
        name: HTTP-timeout discovery
        description: Timeout (s) voor HTTP-calls tijdens ARP/identify discovery.
      metadata_timeout_s:
        name: HTTP-timeout modules
        description: Timeout (s) voor getSysSet / getButtons op modules (verhoog bij trage VLAN).
  installation:
    name: Installatie
    description: Pad naar devices.json (namen, kamers, active flags).
    fields:
      devices_file:
        name: devices.json pad
        description: Installatie-backup; zichtbaar via Samba onder addon_configs/…/devices.json.
      expose_inactive_channels:
        name: Inactieve kanalen tonen
        description: Indien aan staan ongebruikte relay/dimmer-slots (active false) ook in Home Assistant. Standaard uit — de Web UI toont wel alle slots.
  discovery:
    name: Discovery
    description: Runtime auto-discovery op het veldbus-subnet.
    fields:
      discovery_subnet:
        name: Discovery-subnet
        description: /24 subnet voor ARP-sweep en passieve monitor (bijv. 10.10.1).
      discovery_range_start:
        name: Scan-range start
        description: Eerste host in ARP/HTTP scan-range (0 = volledige /24).
      discovery_range_end:
        name: Scan-range eind
        description: Laatste host in ARP/HTTP scan-range.
      auto_discover_on_start:
        name: Discover bij start
        description: Actieve ARP-sweep + HTTP-identify bij add-on start (leeg devices.json triggert altijd sweep).
      passive_arp_monitor:
        name: Passieve ARP-monitor
        description: Meekijken op ARP zonder broadcast (detecteert nieuwe/verwijderde modules).
      arp_poll_interval_s:
        name: ARP-poll interval
        description: Frequentie (s) van de passieve ARP-poll.
      use_env_defaults:
        name: Lab/RE vaste IPs
        description: Poll .30/.40/.50 wanneer devices.json ontbreekt — productie uit laten.
  logging:
    name: Logging
    fields:
      log_level:
        name: Log niveau
        description: debug, info, warning of error.
network:
  8080/tcp: Northbound API — WebSocket /ws en REST /api/v1/ (companion, Web UI via Ingress).
  30200/tcp: Legacy IPBox REST-shim (alleen actief als "IPBox REST-shim" bij Netwerk aan staat).
