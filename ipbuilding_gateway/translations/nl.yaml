configuration:
  fieldbus:
    name: Modules
    description: Communicatie met relais-, dimmer- en ingangsmodules.
    fields:
      buttons_via_ha:
        name: Drukknoppen via Home Assistant
        description: >-
          Aan (standaard): knopdrukken op de IP1100 gaan als events naar Home Assistant.
          Wat er gebeurt bij een druk (lamp aan/uit, scene, automation, …) regel je in HA.


          Uit: knopdrukken blijven lokaal op de IP1100 via de opgeslagen koppelingen.
          Er gaan geen knop-events naar Home Assistant (handig tijdens migratie).


          Groene LED op de module: continu = knoppen via HA (slave), knipperend = lokaal (master).
          Valt de gateway uit, dan valt de module terug op lokale koppelingen.


          Na wijziging: add-on herstarten.
      poll_interval:
        name: Input-poll interval
        description: Alleen als drukknoppen via Home Assistant aan staat. Hoe vaak (seconden) de gateway de ingangsmodule bevraagt (standaard ~2 s).
      actuator_poll_interval:
        name: Actuator-poll interval
        description: Hoe vaak (seconden) de gateway relais- en dimmermodules bevraagt om ze online te houden (standaard ~20 s).
  network:
    name: Netwerk
    description: Instellingen voor de verbinding met de veldbusmodules. De poort van de API en web-UI stel je in onder Network bij de add-on (niet in deze sectie).
    fields:
      bind_ip:
        name: Veldbus-bindadres
        description: Op welk IP-adres de gateway naar de veldbusmodules luistert. Standaard 0.0.0.0 (alle netwerkinterfaces). Zet bijvoorbeeld 10.10.1.1 om alleen op de veldbus-interface te luisteren.
      rest_shim_enabled:
        name: IPBox REST-compatibiliteit
        description: Zet de oude IPBox REST-API op poort 30200 aan, zodat bestaande clients (bijv. de oude HA-integratie) tijdelijk blijven werken tijdens migratie. Standaard uit.
      http_timeout_s:
        name: HTTP-timeout discovery
        description: Maximale wachttijd (seconden) bij het herkennen van modules tijdens discovery.
      metadata_timeout_s:
        name: HTTP-timeout modules
        description: Maximale wachttijd (seconden) bij het ophalen van modulegegevens. Verhoog bij een trage VLAN-verbinding.
  installation:
    name: Installatie
    description: Installatie-instellingen en pad naar devices.json (namen, kamers, actief/inactief).
    fields:
      expose_inactive_channels:
        name: Inactieve kanalen tonen
        description: Toon ongebruikte relay-/dimmer-kanalen (active: false). Standaard uit — de Web UI toont altijd alle kanalen.
      multi_press:
        name: Dubbel- en driedubbelklik
        description: >-
          Herken dubbele en driedubbele druk op alle wandknoppen. Het Multi-press
          venster bepaalt hoe lang klikken bij elkaar horen. Add-on herstarten na wijziging.
      multi_press_window_ms:
        name: Multi-press venster (ms)
        description: >-
          Tijd (ms) waarbinnen een tweede of derde klik bij de vorige hoort.
          Standaard 350. Add-on herstarten na wijziging.
      devices_file:
        name: devices.json pad
        description: Pad naar het installatieconfigbestand; via Samba zichtbaar onder addon_configs/…/devices.json.
  discovery:
    name: Discovery
    description: Modules automatisch vinden op het veldbus-subnet.
    fields:
      discovery_subnet:
        name: Discovery-subnet
        description: Subnet (/24) waarop modules worden gezocht (bijv. 10.10.1).
      discovery_range_start:
        name: Scan-range start
        description: Eerste hostnummer in het scanbereik (0 = hele /24).
      discovery_range_end:
        name: Scan-range eind
        description: Laatste hostnummer in het scanbereik.
      auto_discover_on_start:
        name: Discover bij start
        description: Zoek modules bij het starten van de add-on. Een leeg devices.json triggert altijd een scan.
      passive_arp_monitor:
        name: Passieve ARP-monitor
        description: Volg netwerkverkeer om nieuwe of verdwenen modules te detecteren, zonder zelf een broadcast-scan te sturen.
      arp_poll_interval_s:
        name: ARP-poll interval
        description: Hoe vaak (seconden) de passieve monitor het netwerk bekijkt.
      use_env_defaults:
        name: Lab vaste IPs
        description: Gebruik vaste module-IP’s (.30/.40/.50) als devices.json ontbreekt. Alleen voor lab/test — in productie uit laten.
  logging:
    name: Logging
    description: Hoe uitgebreid de add-on logt.
    fields:
      log_level:
        name: Logniveau
        description: debug, info, warning of error.
network:
  8080/tcp: API en web-UI — WebSocket /ws en REST /api/v1/ (companion-integratie; web-UI via Ingress).
  30200/tcp: IPBox REST-compatibiliteit (alleen actief als "IPBox REST-compatibiliteit" bij Netwerk aan staat).
