configuration:
  network:
    name: Netwerk / API
    description: Hub-adres, northbound API en HTTP-timeouts naar veldbusmodules.
    fields:
      hub_ip:
        name: Hub IP-adres
        description: IP waarop de gateway als veldbus-centrale op UDP/1001 luistert (standaard 10.10.1.1).
      api_port:
        name: API-poort
        description: Poort voor WebSocket /ws en REST /api/v1/ (companion, Web UI).
      rest_shim_enabled:
        name: IPBox REST-shim
        description: Legacy IPBox REST op poort 30200 — alleen tijdens migratie.
      http_timeout_s:
        name: HTTP-timeout discovery
        description: Timeout (s) voor HTTP-calls tijdens ARP/identify discovery.
      metadata_timeout_s:
        name: HTTP-timeout modules
        description: Timeout (s) voor getSysSet / getButtons op modules (verhoog bij trage VLAN).
  fieldbus:
    name: Veld-bus
    description: UDP/1001 polling en input-centrale modus (master/slave).
    fields:
      poll_interval:
        name: Input-poll interval
        description: Seconden tussen I0000-polls naar IP1100-ingangsmodules (IPBox ~2 s).
      actuator_poll_interval:
        name: Actuator-poll interval
        description: Seconden tussen relay/dimmer keep-alive polls (P0000 / I9900, IPBox ~20 s).
      hub_role:
        name: Input-centrale modus
        description: >-
          Bepaalt hoe IP1100PoE-ingangsmodules zich gedragen ten opzichte van deze gateway als centrale op de veldbus.


          Slave (full) — standaard: de gateway pollt de ingangsmodule (I0000) en ontvangt drukknop-events (B-…E). De module gedraagt zich als slave: groene LED brandt continu, knoppen sturen events naar de centrale. Scenes en automatisering horen in Home Assistant (niet in de gateway).


          Master / autonoom (actuators_only) — migratie: de gateway pollt geen ingangen en claimt de module niet. De IP1100 valt terug op de autonomietabel in EEPROM (zoals wanneer de originele centrale uitvalt): groene LED knippert, drukknoppen bedienen basisverlichting lokaal. Scenes, audio, camera’s en bewegingsmelder-logica via de centrale zijn dan niet beschikbaar.


          Gebruik actuators_only tijdens migratie of dual-hub: relay/dimmer via deze gateway, terwijl knoppen lokaal blijven werken zonder dat deze gateway de input claimt. Add-on herstart vereist na wijziging.
  installation:
    name: Installatie
    description: Pad naar devices.json (namen, kamers, active flags).
    fields:
      devices_file:
        name: devices.json pad
        description: Installatie-backup; zichtbaar via Samba onder addon_configs/…/devices.json.
  discovery:
    name: Discovery
    description: Runtime auto-discovery op het veldbus-subnet.
    fields:
      discovery_subnet:
        name: Discovery-subnet
        description: /24 subnet voor ARP-sweep en passieve monitor (bijv. 10.10.1).
      discovery_range_start:
        name: Scan-range start
        description: Eerste host in ARP/HTTP scan-range (0 = volledige /24).
      discovery_range_end:
        name: Scan-range eind
        description: Laatste host in ARP/HTTP scan-range.
      auto_discover_on_start:
        name: Discover bij start
        description: Actieve ARP-sweep + HTTP-identify bij add-on start (leeg devices.json triggert altijd sweep).
      passive_arp_monitor:
        name: Passieve ARP-monitor
        description: Meekijken op ARP zonder broadcast (detecteert nieuwe/verwijderde modules).
      arp_poll_interval_s:
        name: ARP-poll interval
        description: Frequentie (s) van de passieve ARP-poll.
      use_env_defaults:
        name: Lab/RE vaste IPs
        description: Poll .30/.40/.50 wanneer devices.json ontbreekt — productie uit laten.
  logging:
    name: Logging
    fields:
      log_level:
        name: Log niveau
        description: debug, info, warning of error.
