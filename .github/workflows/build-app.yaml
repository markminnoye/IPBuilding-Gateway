# build-app.yaml — reusable workflow for building a HA add-on image
#
# Called by builder.yaml with:
#   app:       subfolder name (e.g. ipbuilding_gateway)
#   publish:   true/false — whether to push to ghcr.io
#
# Prerequisites:
#   - repo has a Packages section at ghcr.io/<owner>/<repo>
#   - Packages visibility is set to Public (manual step after first run)
#   - Repository Settings → Actions → Workflow permissions: Read and write

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      publish:
        required: true
        type: boolean

env:
  # Files/dirs that trigger a rebuild when changed
  MONITORED_FILES: "config.yaml Dockerfile run.sh prepare-build.sh"
  BUILD_CONTEXT: "./${{ inputs.app }}"

jobs:
  prepare:
    name: Prepare build
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.info.outputs.image }}
      registry_prefix: ${{ steps.info.outputs.registry_prefix }}
      version: ${{ steps.info.outputs.version }}
      name: ${{ steps.info.outputs.name }}
      description: ${{ steps.info.outputs.description }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare build context (pre-build copy for monorepo)
        run: ./${{ inputs.app }}/prepare-build.sh

      - name: Extract app information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ${{ env.BUILD_CONTEXT }}

      - name: Prepare multi-arch build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.03.2
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.info.outputs.image_name }}
          registry-prefix: ${{ steps.info.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare build context
        run: ./${{ inputs.app }}/prepare-build.sh

      - name: Build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ${{ env.BUILD_CONTEXT }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            ${{ github.ref_name == 'main' && 'latest' || '' }}
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
          push: ${{ inputs.publish }}
          version: ${{ needs.prepare.outputs.version }}

  publish-manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.03.2
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            ${{ github.ref_name == 'main' && 'latest' || '' }}
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}