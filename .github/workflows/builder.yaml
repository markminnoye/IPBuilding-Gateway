# builder.yaml — triggers for the HA add-on build
#
# How versioning works:
# - The image tag is always derived from config.yaml's `version` field.
# - On git tag v<semver>:    build and push :<semver> (strip the leading 'v')
# - Push to main / PR:       no build (releases only via tags)
#
# Before tagging a release:
#   1. Bump `version:` in ipbuilding_gateway/config.yaml  (e.g. 0.0.1 → 0.0.2)
#   2. Update ipbuilding_gateway/CHANGELOG.md (see .cursor/rules/release-process.mdc)
#   3. Commit and push
#   4. Tag that commit:  git tag v0.0.2 && git push --tags
#   5. CI will build and push :0.0.2
#
# Required repository settings:
#   GitHub Actions → Workflow permissions → "Read and write permissions"
#   Packages → ghcr.io package visibility → Public  (after first successful run)

name: Build add-on

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-app:
    uses: ./.github/workflows/build-app.yaml
    with:
      app: ipbuilding_gateway
      publish: true
    secrets: inherit
